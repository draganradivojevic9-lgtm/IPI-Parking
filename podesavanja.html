<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b0b0c">
    <title>Podešavanja - IPI Parking</title>
    <style>
        :root {
            --bg: #0b0b0c; --card-gray: #1c1c1e; --text: #ffffff;
            --green: #32d74b; --blue: #0a84ff; --red: #ff453a;
            --nav-bg: #161618; --border: #2c2c2e; --input-bg: #1c1c1e;
        }
        body.light-mode {
            --bg: #f2f2f7; --card-gray: #ffffff; --text: #000000;
            --nav-bg: #ffffff; --border: #d1d1d6; --input-bg: #e5e5ea;
        }
       
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; transition: background 0.3s, color 0.3s; }
       
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 430px; margin: 0 auto; position: relative; }
       
        .top-bar { flex-shrink: 0; display: flex; justify-content: center; align-items: center; padding: 20px 16px 15px 16px; }
        .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
       
        .fixed-content { flex: 1; display: flex; flex-direction: column; padding: 0 16px; overflow: hidden; }
       
        /* STILOVI ZA VOZILA */
        .input-label { font-size: 11px; color: #8e8e93; margin-bottom: 2px; margin-left: 4px; }
        .vehicle-row { display: flex; align-items: center; margin-bottom: 8px; }
        .inputs-wrapper { display: flex; flex: 1; background: var(--input-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .inputs-wrapper input { flex: 1; background: transparent; border: none; color: var(--text); padding: 10px 12px; font-size: 15px; outline: none; width: 50%; user-select: auto; }
        .inputs-wrapper input::placeholder { color: #8e8e93; }
        .divider { width: 1px; background: var(--border); }
        .delete-btn { background: var(--input-bg); border: 1px solid var(--border); color: var(--red); border-radius: 50%; width: 32px; height: 32px; margin-left: 10px; display: flex; justify-content: center; align-items: center; font-size: 12px; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .delete-btn:active { opacity: 0.6; transform: scale(0.9); }
       
        .action-group { margin-top: 15px; }
       
        .save-btn { background: var(--green); color: #000; width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 0.5px; }
        .save-btn:active { transform: scale(0.97); opacity: 0.9; }
       
        .credit-card { background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-top: 10px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .credit-card:active { transform: scale(0.97); opacity: 0.8; }
        .credit-icon { font-size: 20px; margin-right: 12px; display: flex; align-items: center; justify-content: center; }
        .credit-text { font-size: 15px; font-weight: 600; flex: 1; color: var(--text); }
        .credit-arrow { font-size: 18px; color: #8e8e93; }

        /* PICKER (BOTTOM SHEET MODAL) */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 999; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
       
        .bottom-sheet { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--card-gray); border-radius: 20px 20px 0 0; z-index: 1000; transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); padding: 15px 16px 40px 16px; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; }
        .bottom-sheet.active { bottom: 0; }
       
        .sheet-handle { width: 40px; height: 5px; background: #8e8e93; border-radius: 3px; margin: 0 auto 15px auto; opacity: 0.5; }
        .sheet-title { text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 25px; color: var(--text); }
       
        .qr-container { text-align: center; margin-bottom: 25px; }
        .qr-box { background: #ffffff; padding: 15px; border-radius: 16px; display: inline-block; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .qr-box img { width: 180px; height: 180px; display: block; }
        .qr-instruction { font-size: 14px; color: #8e8e93; line-height: 1.4; padding: 0 20px; }
       
        .account-details { background: var(--input-bg); border: 1px solid var(--border); padding: 16px; border-radius: 12px; margin-bottom: 10px; }
        .acc-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
        .acc-row:last-child { border-bottom: none; padding-bottom: 0; }
        .acc-row:first-child { padding-top: 0; }
        .acc-row span { color: #8e8e93; font-size: 13px; }
        .acc-row strong { color: var(--text); font-weight: 600; text-align: right; }

        /* NOVE KARTICE ZA IZNOS */
        .amount-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .amount-card { flex: 1; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; text-align: center; font-weight: 700; cursor: pointer; transition: 0.2s; color: var(--text); }
        .amount-card.active { border-color: var(--green); background: #1a2e1d; }

        .bottom-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--nav-bg); z-index: 100; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 5px); }
        .nav { height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { text-align: center; color: #8e8e93; font-size: 11px; cursor: pointer; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        .nav-item.active { color: var(--blue); }
        .nav-item span { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar"><div class="page-title" id="page-title">Podešavanja vozila</div></div>
       
        <div class="fixed-content">
            <div id="vehicles-container"></div>
            <div class="action-group" id="action-container"></div>
        </div>
       
        <div class="bottom-container">
            <nav class="nav">
                <div class="nav-item" onclick="window.location.href='index.html'"><span>🏠</span><div id="nav-home">Početna</div></div>
                <div class="nav-item" onclick="window.location.href='index.html?open=history'"><span>📜</span><div id="nav-hist">Istorija</div></div>
                <div class="nav-item" onclick="window.location.href='index.html?open=about'"><span>ℹ️</span><div id="nav-about">O nama</div></div>
                <div class="nav-item active"><span>⚙️</span><div id="nav-set">Podešavanja</div></div>
            </nav>
        </div>
    </div>

    <div class="modal-overlay" id="picker-overlay" onclick="closePicker()"></div>
    <div class="bottom-sheet" id="picker-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="picker-title">Uplata kredita</div>
       
        <div class="qr-container">
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=IPI+Parking+Primer" alt="IPS QR">
            </div>
            <div class="qr-instruction" id="qr-inst">Skenirajte IPS QR kod aplikacijom vaše banke.</div>
        </div>

        <div class="account-details">
            <div class="acc-row">
                <span id="lbl-rec">Primalac:</span>
                <strong>IPI Parking</strong>
            </div>
            <div class="acc-row">
                <span id="lbl-acc">Broj računa:</span>
                <strong>170-0000000000000-00</strong>
            </div>
            <div class="acc-row">
                <span id="lbl-ref">Poziv na broj:</span>
                <strong id="dynamic-ref">---</strong>
            </div>
           
            <div class="amount-row" style="margin-top: 15px;">
                <div class="amount-card" id="card-500" onclick="selectAmount(500)">500 RSD</div>
                <div class="amount-card" id="card-1000" onclick="selectAmount(1000)">1000 RSD</div>
            </div>
        </div>

        <div style="margin-top: 20px; padding: 0 5px;">
            <label style="display: flex; align-items: center; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text);">
                <input type="checkbox" id="auto-topup" style="width: 18px; height: 18px; margin-right: 10px; accent-color: var(--green);">
                <span id="lbl-auto">Automatska dopuna (< 200 RSD)</span>
            </label>
            <p id="security-txt" style="font-size: 12px; color: #8e8e93; margin-top: 15px; line-height: 1.4; text-align: center;">
            </p>
        </div>
    </div>

    <script>
        const TRANSLATE = {
            SRB: {
                title: "Podešavanja vozila", labels: "Ime vozila | Tablica", namePh: "npr. GOLF", platePh: "npr. BG123AB",
                saveBtn: "SAČUVAJ", savedBtn: "SAČUVANO ✔", home: "Početna", hist: "Istorija", about: "O nama", set: "Podešavanja",
                topupBtn: "Dopuni kredit", pickerTitle: "Uplata kredita",
                qrInst: "Skenirajte IPS QR kod aplikacijom vaše banke.", rec: "Primalac:", acc: "Broj računa:", ref: "Poziv na broj:",
                auto: "Automatska dopuna (< 200 RSD)",
                security: "Plaćanje je potpuno bezbedno. Sve transakcije procesuira <b>PaySpot</b>, vodeći licencirani platni servis pod nadzorom Narodne banke Srbije. Mi nemamo uvid u podatke vaše kartice, niti ih čuvamo na našim serverima. Automatsku dopunu možete isključiti u bilo kom trenutku. Automatska dopuna radi po principu da se, kada kredit padne ispod 200 RSD, automatski dopunjuje sa 500 RSD."
            },
            ENG: {
                title: "Vehicle Settings", labels: "Vehicle Name | Plate", namePh: "e.g. GOLF", platePh: "e.g. BG123AB",
                saveBtn: "SAVE", savedBtn: "SAVED ✔", home: "Home", hist: "History", about: "About Us", set: "Settings",
                topupBtn: "Top Up Credit", pickerTitle: "Top Up Credit",
                qrInst: "Scan the IPS QR code with your mobile banking app.", rec: "Recipient:", acc: "Account No:", ref: "Reference No:",
                auto: "Auto-top up (< 200 RSD)",
                security: "Payment is completely secure. All transactions are processed by <b>PaySpot</b>, a leading licensed payment service supervised by the National Bank of Serbia. We do not have access to your card details, nor do we store them. You can disable auto-top up at any time. Auto-top up works on the principle that when your credit falls below 200 RSD, it is automatically topped up with 500 RSD."
            }
        };

        let lang = localStorage.getItem('ipi_lang') || 'SRB';
        let currentTheme = localStorage.getItem('ipi_theme') || 'dark';

        function init() {
            document.body.className = currentTheme === 'light' ? 'light-mode' : '';
            applyTranslations();
            renderInputs();
            loadData();
        }

        function applyTranslations() {
            const t = TRANSLATE[lang];
            document.getElementById('page-title').innerText = t.title;
            document.getElementById('nav-home').innerText = t.home;
            document.getElementById('nav-hist').innerText = t.hist;
            document.getElementById('nav-about').innerText = t.about;
            document.getElementById('nav-set').innerText = t.set;
           
            document.getElementById('picker-title').innerText = t.pickerTitle;
            document.getElementById('qr-inst').innerText = t.qrInst;
            document.getElementById('lbl-rec').innerText = t.rec;
            document.getElementById('lbl-acc').innerText = t.acc;
            document.getElementById('lbl-ref').innerText = t.ref;
            document.getElementById('lbl-auto').innerText = t.auto;
            document.getElementById('security-txt').innerHTML = t.security;
        }

        // Nova funkcija za biranje iznosa
        function selectAmount(amount) {
            document.getElementById('card-500').classList.remove('active');
            document.getElementById('card-1000').classList.remove('active');
            document.getElementById('card-' + amount).classList.add('active');
            // Ovde kasnije dodajemo logiku za generisanje specifičnog QR koda
        }

        function renderInputs() {
            const vContainer = document.getElementById('vehicles-container');
            const aContainer = document.getElementById('action-container');
            const t = TRANSLATE[lang];
           
            let htmlVozila = "";
            for(let i=1; i<=5; i++) {
                htmlVozila += `<div class="input-label">${t.labels}</div>
                <div class="vehicle-row">
                    <div class="inputs-wrapper">
                        <input type="text" id="v-name-${i}" placeholder="${t.namePh}" oninput="saveData(false)">
                        <div class="divider"></div>
                        <input type="text" id="v-plate-${i}" placeholder="${t.platePh}" style="text-transform: uppercase;" oninput="saveData(false)">
                    </div>
                    <div class="delete-btn" onclick="clearRow(${i})">❌</div>
                </div>`;
            }
            vContainer.innerHTML = htmlVozila;
           
            aContainer.innerHTML = `
                <button class="save-btn" id="save-btn" onclick="saveData(true)">${t.saveBtn}</button>
                <div class="credit-card" onclick="openPicker()">
                    <div class="credit-icon">💳</div>
                    <div class="credit-text">${t.topupBtn}</div>
                    <div class="credit-arrow">›</div>
                </div>
            `;
        }

        function loadData() {
            let savedData = JSON.parse(localStorage.getItem('ipi_vehicles') || '[]');
            for(let i=0; i<5; i++) {
                if(savedData[i]) {
                    document.getElementById(`v-name-${i+1}`).value = savedData[i].name || '';
                    document.getElementById(`v-plate-${i+1}`).value = savedData[i].plate || '';
                }
            }
        }

        function clearRow(index) {
            document.getElementById(`v-name-${index}`).value = '';
            document.getElementById(`v-plate-${index}`).value = '';
            saveData(false);
        }

        function saveData(showFeedback = true) {
            let vehicles = [];
            for(let i=1; i<=5; i++) {
                let nameEl = document.getElementById(`v-name-${i}`);
                let plateEl = document.getElementById(`v-plate-${i}`);
                if(!nameEl || !plateEl) continue;

                let nameVal = nameEl.value.trim();
                let plateVal = plateEl.value.trim().toUpperCase().replace(/\s/g, '');
               
                if(nameVal !== '' || plateVal !== '') {
                    vehicles.push({ name: nameVal, plate: plateVal });
                }
            }
           
            localStorage.setItem('ipi_vehicles', JSON.stringify(vehicles));
           
            if(vehicles.length > 0) {
                let currentSel = localStorage.getItem('ipi_selected_plate');
                let validSelection = vehicles.find(v => v.plate === currentSel);
                if(!validSelection) {
                    localStorage.setItem('ipi_selected_plate', vehicles[0].plate);
                }
            } else {
                localStorage.setItem('ipi_selected_plate', '---');
            }

            if(showFeedback) {
                const btn = document.getElementById('save-btn');
                btn.innerText = TRANSLATE[lang].savedBtn;
                btn.style.background = "#28a745";
                setTimeout(() => { btn.innerText = TRANSLATE[lang].saveBtn; btn.style.background = "var(--green)"; }, 1500);
            }
        }

        function openPicker() {
            let izabranaTablica = localStorage.getItem('ipi_selected_plate') || '---';
            document.getElementById('dynamic-ref').innerText = izabranaTablica;

            document.getElementById('picker-overlay').classList.add('active');
            document.getElementById('picker-sheet').classList.add('active');
        }

        function closePicker() {
            document.getElementById('picker-overlay').classList.remove('active');
            document.getElementById('picker-sheet').classList.remove('active');
        }

        window.onload = init;
    </script>
</body>
</html>
